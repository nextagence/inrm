<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuickCash India — Fast Personal Loan Access</title>
  <meta name="description" content="Apply through our trusted loan partner network. Simple process, clear steps, fast redirection." />
  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --soft: #1f2937;
      --text: #f8fafc;
      --muted: #94a3b8;
      --line: rgba(255,255,255,0.08);
      --brand: #22c55e;
      --brand-dark: #16a34a;
      --warning: #f59e0b;
      --danger: #ef4444;
      --shadow: 0 20px 60px rgba(0,0,0,.35);
      --radius: 22px;
      --max: 1180px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top right, rgba(34,197,94,.18), transparent 22%),
        radial-gradient(circle at left center, rgba(59,130,246,.12), transparent 20%),
        linear-gradient(180deg, #020617 0%, #0f172a 45%, #111827 100%);
      line-height: 1.55;
    }

    a { color: inherit; text-decoration: none; }
    img { max-width: 100%; display: block; }
    .container { width: min(var(--max), calc(100% - 32px)); margin: 0 auto; }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 50;
      backdrop-filter: blur(16px);
      background: rgba(2,6,23,.72);
      border-bottom: 1px solid var(--line);
    }

    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      padding: 14px 0;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 800;
      letter-spacing: .2px;
    }

    .brand-badge {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, var(--brand), #14b8a6);
      color: #052e16;
      font-weight: 900;
      box-shadow: var(--shadow);
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 18px;
      color: var(--muted);
      font-size: 14px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      border: 0;
      cursor: pointer;
      border-radius: 16px;
      padding: 14px 22px;
      font-weight: 800;
      transition: .2s ease;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--brand), #4ade80);
      color: #052e16;
      box-shadow: 0 14px 30px rgba(34,197,94,.24);
    }

    .btn-primary:hover { transform: translateY(-1px); background: linear-gradient(135deg, #4ade80, var(--brand)); }
    .btn-secondary {
      background: rgba(255,255,255,.06);
      color: var(--text);
      border: 1px solid var(--line);
    }

    .hero {
      padding: 72px 0 42px;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: 1.15fr .85fr;
      gap: 28px;
      align-items: center;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(34,197,94,.12);
      border: 1px solid rgba(34,197,94,.22);
      color: #bbf7d0;
      font-size: 13px;
      font-weight: 700;
    }

    h1 {
      font-size: clamp(34px, 6vw, 62px);
      line-height: .98;
      margin: 18px 0 16px;
      letter-spacing: -1.4px;
    }

    .hero p {
      font-size: 18px;
      color: #cbd5e1;
      max-width: 660px;
      margin: 0 0 24px;
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-bottom: 18px;
    }

    .mini-points {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      color: var(--muted);
      font-size: 14px;
    }

    .mini-points span {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,.04);
      padding: 10px 12px;
      border-radius: 999px;
      border: 1px solid var(--line);
    }

    .hero-card {
      background: linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.03));
      border: 1px solid var(--line);
      border-radius: 28px;
      padding: 24px;
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }

    .hero-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at top right, rgba(34,197,94,.16), transparent 32%);
      pointer-events: none;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
      margin-top: 18px;
    }

    .stat {
      background: rgba(255,255,255,.04);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 18px;
    }

    .stat strong {
      display: block;
      font-size: 24px;
      margin-bottom: 4px;
    }

    .section {
      padding: 22px 0 70px;
    }

    .section-head {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 22px;
    }

    .section-head h2 {
      font-size: clamp(26px, 4vw, 40px);
      margin: 0;
      letter-spacing: -.8px;
    }

    .section-head p {
      margin: 0;
      max-width: 680px;
      color: var(--muted);
    }

    .grid-3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
    }

    .card {
      background: rgba(255,255,255,.05);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 22px;
      box-shadow: var(--shadow);
    }

    .icon {
      width: 46px;
      height: 46px;
      display: grid;
      place-items: center;
      border-radius: 14px;
      background: rgba(34,197,94,.14);
      margin-bottom: 14px;
      font-size: 20px;
    }

    .card h3 {
      margin: 0 0 10px;
      font-size: 20px;
    }

    .card p, .card li, .faq p {
      color: #cbd5e1;
    }

    .steps {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
    }

    .step-num {
      width: 36px;
      height: 36px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--brand), #4ade80);
      color: #052e16;
      display: grid;
      place-items: center;
      font-weight: 900;
      margin-bottom: 12px;
    }

    .notice {
      background: rgba(245,158,11,.08);
      border: 1px solid rgba(245,158,11,.2);
      color: #fde68a;
      padding: 18px 20px;
      border-radius: 18px;
      margin-top: 22px;
    }

    .disclosure {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
      margin-top: 18px;
    }

    .faq-wrap {
      display: grid;
      gap: 14px;
    }

    details {
      background: rgba(255,255,255,.05);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 18px 20px;
    }

    summary {
      cursor: pointer;
      font-weight: 800;
      list-style: none;
    }

    summary::-webkit-details-marker { display: none; }

    .cta-banner {
      margin-top: 22px;
      padding: 26px;
      border-radius: 28px;
      background: linear-gradient(135deg, rgba(34,197,94,.16), rgba(20,184,166,.12));
      border: 1px solid rgba(255,255,255,.08);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .footer {
      padding: 32px 0 50px;
      color: var(--muted);
      border-top: 1px solid var(--line);
    }

    .footer-grid {
      display: grid;
      grid-template-columns: 1.2fr .8fr;
      gap: 20px;
    }

    .small {
      font-size: 13px;
      color: var(--muted);
    }

    .muted {
      color: var(--muted);
    }

    .risk {
      color: #fecaca;
      background: rgba(239,68,68,.08);
      border: 1px solid rgba(239,68,68,.18);
      border-radius: 18px;
      padding: 18px 20px;
      margin-top: 18px;
    }

    @media (max-width: 980px) {
      .hero-grid,
      .grid-3,
      .steps,
      .disclosure,
      .footer-grid {
        grid-template-columns: 1fr;
      }

      .nav-links { display: none; }
      .hero { padding-top: 44px; }
    }

    @media (max-width: 640px) {
      .container { width: min(var(--max), calc(100% - 20px)); }
      .hero-card, .card, details, .cta-banner { border-radius: 22px; }
      .btn { width: 100%; }
      .hero-actions { flex-direction: column; }
      .stats { grid-template-columns: 1fr; }
    }
  </style>
</head>

    <div class="container nav">
      <a href="#top" class="brand" aria-label="QuickCash India home">
        <span class="brand-badge">₹</span>
        <span>QuickCash India</span>
      </a>

      <nav class="nav-links">
